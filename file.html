<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>To-Do List</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        margin: 0;
        padding: 0;
    }
    header {
        background: #4CAF50;
        color: white;
        padding: 15px;
        text-align: center;
    }
    main {
        display: flex;
        justify-content: space-around;
        padding: 20px;
        flex-wrap: wrap;
    }
    section {
        background: white;
        border-radius: 5px;
        padding: 15px;
        width: 45%;
        min-width: 300px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
        text-align: center;
    }
    form {
        display: flex;
        justify-content: center;
        margin-bottom: 15px;
    }
    input[type="text"] {
        width: 70%;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 3px;
        margin-right: 5px;
    }
    button {
        padding: 8px 12px;
        border: none;
        border-radius: 3px;
        cursor: pointer;
    }
    .add-btn { background: #4CAF50; color: white; }
    .finish-btn { background: #2196F3; color: white; margin-right: 5px; }
    .edit-btn { background: #FFC107; color: white; margin-right: 5px; }
    .delete-btn { background: #f44336; color: white; }
    ul {
        list-style: none;
        padding: 0;
    }
    li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #fafafa;
        border-bottom: 1px solid #ddd;
        padding: 8px;
        border-radius: 3px;
        margin-bottom: 5px;
    }
    /* Progress bar */
    #progressContainer {
        width: 80%;
        margin: 15px auto;
        background: #ddd;
        border-radius: 20px;
        overflow: hidden;
        height: 25px;
    }
    #progressBar {
        height: 100%;
        width: 0%;
        background: #4CAF50;
        text-align: center;
        color: white;
        line-height: 25px;
        font-weight: bold;
    }
</style>
</head>
<body>

<header>
    <h1>My To-Do List</h1>
</header>

<!-- Progress -->
<div id="progressContainer">
    <div id="progressBar">0%</div>
</div>

<main>
    <section>
        <h2>Add New Task</h2>
        <form id="taskForm">
            <input type="text" id="taskInput" placeholder="Enter your task..." required>
            <button type="submit" class="add-btn">Add</button>
        </form>
    </section>
</main>

<main>
    <section>
        <h2>To-Do Tasks</h2>
        <ul id="todoList"></ul>
    </section>

    <section>
        <h2>Finished Tasks</h2>
        <ul id="finishedList"></ul>
    </section>
</main>

<script>
const taskForm = document.getElementById('taskForm');
const taskInput = document.getElementById('taskInput');
const todoList = document.getElementById('todoList');
const finishedList = document.getElementById('finishedList');
const progressBar = document.getElementById('progressBar');

function updateProgress() {
    const total = todoList.children.length + finishedList.children.length;
    const finished = finishedList.children.length;
    let percent = total === 0 ? 0 : Math.round((finished / total) * 100);
    progressBar.style.width = percent + '%';
    progressBar.textContent = percent + '%';
}

function createTaskElement(text, isFinished = false) {
    const li = document.createElement('li');
    const span = document.createElement('span');
    span.textContent = text;
    li.appendChild(span);

    const btnContainer = document.createElement('div');

    if (!isFinished) {
        const finishBtn = document.createElement('button');
        finishBtn.textContent = 'Finish';
        finishBtn.className = 'finish-btn';
        finishBtn.onclick = () => {
            todoList.removeChild(li);
            finishedList.appendChild(createTaskElement(text, true));
            updateProgress();
        };
        btnContainer.appendChild(finishBtn);

        const editBtn = document.createElement('button');
        editBtn.textContent = 'Edit';
        editBtn.className = 'edit-btn';
        editBtn.onclick = () => {
            const newText = prompt('Edit task:', span.textContent);
            if (newText !== null && newText.trim() !== '') {
                span.textContent = newText.trim();
            }
        };
        btnContainer.appendChild(editBtn);
    }

    const deleteBtn = document.createElement('button');
    deleteBtn.textContent = 'Delete';
    deleteBtn.className = 'delete-btn';
    deleteBtn.onclick = () => {
        li.parentNode.removeChild(li);
        updateProgress();
    };
    btnContainer.appendChild(deleteBtn);

    li.appendChild(btnContainer);
    return li;
}

taskForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const text = taskInput.value.trim();
    if (text) {
        todoList.appendChild(createTaskElement(text));
        taskInput.value = '';
        updateProgress();
    }
});
updateProgress();
</script>

</body>
</html>
